services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  api:
    build: .
    container_name: lma-api
    depends_on:
      - qdrant
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # внутри сети compose сервису api Qdrant доступен по имени "qdrant"
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - .:/app:ro
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  qdrant_storage:
